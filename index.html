<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ring PDP Mockup - Outdoor Cam Pro 4K - Install Widget</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #fff; padding: 20px; }
.mockup { max-width: 520px; margin: 0 auto; }

.section-label { font-size: 13px; color: #333; font-weight: 500; margin-bottom: 10px; }
.power-pills { display: flex; gap: 8px; margin-bottom: 24px; }
.power-pill { padding: 14px 20px; border: 2px solid #d5d9d9; border-radius: 10px; font-size: 14px; cursor: pointer; background: #fff; font-family: inherit; transition: all 0.15s; }
.power-pill:hover { border-color: #007185; }
.power-pill.selected { border-color: #1C4B82; background: #e7f4f5; }

.delivery-row { display: flex; align-items: center; gap: 10px; padding: 14px 16px; background: #f5f5f5; border-radius: 10px; margin-bottom: 24px; font-size: 14px; color: #333; }
.delivery-row a { color: #007185; text-decoration: none; font-weight: 600; }

.install-widget { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border: 1px solid #d5d9d9; border-radius: 10px; margin-bottom: 16px; }
.install-widget svg { width: 24px; height: 24px; flex-shrink: 0; }
.install-widget svg path { fill: #1C4B82; }
.install-widget a { font-size: 15px; font-weight: 500; color: #007185; text-decoration: underline; cursor: pointer; }

.atc-btn { width: 100%; padding: 16px; font-size: 16px; font-weight: 600; background: #0f1111; color: #fff; border: none; border-radius: 24px; cursor: pointer; margin-bottom: 16px; font-family: inherit; }
.atc-btn:hover { background: #1a1a2e; }

.promo { color: #cc0c39; font-size: 13px; font-weight: 600; }

/* Modal */
.modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; justify-content:center; align-items:center; }
.modal-overlay.active { display:flex; }
.modal { background:#fff; border-radius:12px; width:90%; max-width:420px; overflow:hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
.modal-header { text-align:center; padding:18px 24px; border-bottom:2px solid #e0e0e0; }
.modal-header h4 { font-size:16px; font-weight:600; margin:0; color:#0f1111; }
.modal-body { padding:24px; }
.modal-body label { display:block; font-size:16px; font-weight:500; margin-bottom:12px; color:#0f1111; }
.modal-opts { display:flex; gap:12px; margin-bottom:24px; }
.modal-opt { flex:1; padding:12px; border:2px solid #d5d9d9; border-radius:8px; background:#fff; font-size:14px; font-weight:500; cursor:pointer; text-align:center; font-family:inherit; transition: all 0.15s; }
.modal-opt:hover { border-color: #1C4B82; }
.modal-opt.selected { border-color:#1C4B82; background:#EBF4FA; color:#1C4B82; }
.modal-footer { display:flex; gap:12px; padding:16px 24px; border-top:1px solid #e8e8e8; }
.modal-footer button { flex:1; padding:14px; border-radius:24px; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; }
.btn-back { border:2px solid #0f1111; background:#fff; color:#0f1111; }
.btn-back:hover { background:#f5f5f5; }
.btn-check { border:none; background:#0f1111; color:#fff; }
.btn-check:hover { background:#333; }
.modal-msg { margin-top:16px; padding:14px; border-radius:8px; font-size:14px; font-weight:500; line-height:1.5; }
.msg-warn { background:#fff3e0; color:#e65100; }
.msg-error { background:#fce4ec; color:#c62828; }
.msg-success { background:#e8f5e9; color:#2e7d32; }
</style>
</head>
<body>
<div class="mockup">
  <p class="section-label">Camera power type</p>
  <div class="power-pills">
    <div class="power-pill selected" onclick="selectPower(this)">Plug-In</div>
    <div class="power-pill" onclick="selectPower(this)">Wired</div>
    <div class="power-pill" onclick="selectPower(this)">Power over Ethernet</div>
  </div>

  <div class="delivery-row">🚚 Add <a href="#">ZIP code</a> for delivery options</div>

  <div class="install-widget" id="installWidget">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none"><path d="M12 3L2 12h3v8h6v-5h2v5h6v-8h3L12 3zm5 15h-2v-5H9v5H7v-7.19l5-4.5 5 4.5V18z"/></svg>
    <a id="openModal">Book your device installation from $129.00!</a>
  </div>

  <button class="atc-btn">Add to Cart</button>
  <p class="promo">Offer ends on 6/26 at 9 PM PST.</p>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header"><h4>Professional Installation</h4></div>
    <div class="modal-body">
      <label>1. Do you have an existing junction box?</label>
      <div class="modal-opts" id="junctionQ">
        <button class="modal-opt" onclick="sel(this)">Yes</button>
        <button class="modal-opt" onclick="sel(this)">No</button>
      </div>
      <label>2. Is the install location below 12 feet?</label>
      <div class="modal-opts" id="heightQ">
        <button class="modal-opt" onclick="sel(this)">Yes</button>
        <button class="modal-opt" onclick="sel(this)">No</button>
      </div>
      <div id="modalMsg"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-back" onclick="closeModal()">Back</button>
      <button class="btn-check" onclick="checkEligibility()">Check Eligibility</button>
    </div>
  </div>
</div>

<script>
function selectPower(el) {
  document.querySelectorAll('.power-pill').forEach(function(p){p.classList.remove('selected');});
  el.classList.add('selected');
}
function sel(btn) {
  btn.parentElement.querySelectorAll('.modal-opt').forEach(function(b){b.classList.remove('selected');});
  btn.classList.add('selected');
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  document.getElementById('modalMsg').innerHTML='';
  document.querySelectorAll('.modal-opt').forEach(function(b){b.classList.remove('selected');});
}
function checkEligibility() {
  var j = document.querySelector('#junctionQ .modal-opt.selected');
  var h = document.querySelector('#heightQ .modal-opt.selected');
  if (!j || !h) { document.getElementById('modalMsg').innerHTML='<div class="modal-msg msg-warn">Please answer both questions.</div>'; return; }
  if (j.textContent === 'No') {
    document.getElementById('modalMsg').innerHTML='<div class="modal-msg msg-warn">⚠️ An existing junction box is required. You will need to hire a licensed electrician to install a junction box before scheduling professional installation.</div>';
  } else if (h.textContent === 'No') {
    document.getElementById('modalMsg').innerHTML='<div class="modal-msg msg-error">Installation locations above 12 feet are not supported. Returning to product page...</div>';
    setTimeout(closeModal, 2000);
  } else {
    document.getElementById('modalMsg').innerHTML='<div class="modal-msg msg-success">✓ You are eligible for professional installation! Installation has been added to your cart.</div>';
  }
}
document.getElementById('openModal').addEventListener('click',function(e){e.preventDefault();document.getElementById('modalOverlay').classList.add('active');});
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
</script>
</body>
</html>
